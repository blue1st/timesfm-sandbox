name: "Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-release:
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15-intel
            arch: x64
    steps:
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: update package.json version from tag
        run: |
          VERSION=${{ github.ref_name }}
          # Remove 'v' prefix if present
          VERSION_NUM=${VERSION#v}
          npm version $VERSION_NUM --no-git-tag-version --allow-same-version

      - name: install dependencies
        run: |
          for i in 1 2 3 4 5; do npm install && break || sleep 15; done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install "numpy<2"
          pip install -r backend/requirements.txt

      - name: Build Python backend
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: backend/server.py
          mode: standalone
          enable-plugins: numpy,torch
          include-package: pandas,timesfm
          output-dir: build-python/backend
          lto: "no"
          jobs: 3

      - name: Remove broken symlinks from Nuitka build
        run: |
          find build-python/backend -type l ! -exec test -e {} \; -delete || true
          echo "Cleaned broken symlinks from build output"

      - name: build and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do npm run dist -- --mac --${{ matrix.arch }} -p always && break || sleep 15; done

  update-tap:
    needs: publish-release
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: update package.json version from tag
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NUM=${VERSION#v}
          npm version $VERSION_NUM --no-git-tag-version --allow-same-version

      - name: Download artifacts from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${{ github.ref_name }}
          gh release edit "$TAG_NAME" --draft=false || true
          gh release download "$TAG_NAME" --pattern "*.dmg" --dir .
          ls -R

      - name: Update Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -d "scripts" ] && [ -f "scripts/update-homebrew.sh" ]; then
            chmod +x scripts/update-homebrew.sh
            ./scripts/update-homebrew.sh
          else
            echo "Warning: scripts/update-homebrew.sh not found."
          fi
